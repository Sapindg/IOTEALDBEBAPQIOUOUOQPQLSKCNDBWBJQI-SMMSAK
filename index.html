<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dark Chats v2</title>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --panel-dark: #1a1a1a;
            --accent-purple: #7b2cbf;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --user-bubble: #2d3436;
            --bot-bubble: #1e272e;
            --action-color: #777;
            --thought-color: #9d4edd;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita scroll na página inteira */
        }

        /* Estrutura Principal */
        #setup-screen, #chat-screen { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* Fallback */
            height: 100dvh; /* Altura dinâmica para mobile */
            width: 100%; 
        }

        .hidden { display: none !important; }

        header {
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: var(--panel-dark); 
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .menu-btn, .config-btn, .back-btn { background: none; border: none; color: var(--text-main); font-size: 1.3rem; cursor: pointer; }

        /* Área de Scroll */
        .container { 
            padding: 20px; 
            overflow-y: auto; 
            flex-grow: 1; 
            -webkit-overflow-scrolling: touch;
        }

        h1 { text-align: center; color: var(--accent-purple); margin-bottom: 25px; font-size: 1.8rem; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        
        input, textarea {
            width: 100%; 
            background: var(--panel-dark); 
            border: 1px solid #444; 
            border-radius: 8px;
            padding: 12px; 
            color: white; 
            font-size: 16px; /* 16px evita zoom automático no iOS ao focar */
            outline: none;
        }

        .main-btn {
            width: 100%; 
            background: var(--accent-purple); 
            color: white; 
            border: none;
            padding: 16px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1rem; 
            cursor: pointer;
            margin-bottom: 20px; /* Garante que não cole no final */
        }

        /* Sidebar */
        #sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--panel-dark); z-index: 100; transition: 0.3s; padding: 20px;
            border-right: 1px solid #333;
        }
        #sidebar.open { left: 0; }
        .history-item { padding: 12px; border-bottom: 1px solid #333; font-size: 0.9rem; color: #ccc; }

        /* Chat */
        #chat-messages { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .bubble { max-width: 85%; padding: 12px; border-radius: 15px; line-height: 1.4; font-size: 0.95rem; position: relative; }
        .user-m { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 2px; }
        .bot-m { align-self: flex-start; background: var(--bot-bubble); border-bottom-left-radius: 2px; }

        .action-text { color: var(--action-color); font-style: italic; font-weight: 600; }
        .thought-area { margin-top: 8px; padding: 8px; border-top: 1px solid #333; color: var(--thought-color); font-style: italic; font-size: 0.85rem; }
        .thought-trigger { display: block; font-size: 0.7rem; color: var(--text-dim); margin-top: 5px; text-decoration: underline; }

        /* Rodapé de Entrada Corrigido */
        .chat-input-area { 
            background: var(--panel-dark); 
            padding: 10px 15px; 
            padding-bottom: env(safe-area-inset-bottom, 15px); /* Ajuste para iPhones novos */
            display: flex; 
            gap: 10px; 
            align-items: center; 
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        .chat-input-area textarea { 
            height: 45px; 
            max-height: 120px; 
            flex-grow: 1; 
            padding: 10px 15px; 
            border-radius: 22px; 
            resize: none;
            background: #252525;
            border: none;
        }

        .send-btn { 
            background: var(--accent-purple); 
            border: none; 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            color: white; 
            flex-shrink: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 90; }
        #overlay.active { display: block; }
        
        .divider { border-top: 1px solid #333; margin: 25px 0; position: relative; }
        .divider span { position: absolute; top: -10px; left: 10px; background: var(--bg-dark); padding: 0 8px; font-size: 0.65rem; color: var(--accent-purple); font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="color: var(--accent-purple);">Chats Antigos</h3>
        <div id="history-list"></div>
        <button class="main-btn" style="margin-top: 20px;" onclick="location.reload()">Novo Chat</button>
    </div>
    
    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="setup-screen">
        <header>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <span style="font-weight: bold; font-size: 0.9rem;">DARK CHATS V2</span>
            <div></div>
        </header>
        <div class="container">
            <h1>Dark Chats v2</h1>
            
            <div class="input-group"><label>Modelo OpenRouter</label><input type="text" id="model" placeholder="ex: google/gemini-2.0-flash-001"></div>
            <div class="input-group"><label>API Key</label><input type="password" id="key" placeholder="sk-or-..."></div>
            
            <div class="divider"><span>O PERSONAGEM (BOT)</span></div>
            <div class="input-group"><label>Nome</label><input type="text" id="bot-name" placeholder="Nome da IA"></div>
            <div class="input-group"><label>Personalidade</label><textarea id="bot-personality" rows="3" placeholder="Como ela age?"></textarea></div>
            <div class="input-group"><label>Aparência</label><textarea id="bot-appearance" rows="2" placeholder="Como ela é?"></textarea></div>
            
            <div class="divider"><span>VOCÊ (JOGADOR)</span></div>
            <div class="input-group"><label>Seu Nome</label><input type="text" id="user-name" placeholder="Seu nome no RPG"></div>
            <div class="input-group"><label>Sua Personalidade</label><textarea id="user-personality" rows="2" placeholder="Sua personalidade"></textarea></div>
            <div class="input-group"><label>Sua Aparência</label><textarea id="user-appearance" rows="2" placeholder="Sua aparência"></textarea></div>
            
            <button class="main-btn" onclick="startChat()">Iniciar Conversa</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="back-btn" onclick="backToMenu()">❮</button>
                <b id="active-bot-name" style="font-size: 1rem;">Chat</b>
            </div>
            <button class="config-btn" onclick="openQuickSettings()">⚙️</button>
        </header>
        
        <div id="chat-messages"></div>
        
        <div class="chat-input-area">
            <textarea id="user-input" placeholder="Escreva aqui..."></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        let currentChatId = null;
        let chatHistory = [];

        window.onload = () => {
            loadSidebar();
            if(localStorage.getItem('last_model')) document.getElementById('model').value = localStorage.getItem('last_model');
            if(localStorage.getItem('last_key')) document.getElementById('key').value = localStorage.getItem('last_key');
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function startChat() {
            const required = ['model', 'key', 'bot-name', 'user-name'];
            for(let id of required) {
                if(!document.getElementById(id).value) {
                    alert("Por favor, preencha os campos obrigatórios!");
                    return;
                }
            }

            localStorage.setItem('last_model', document.getElementById('model').value);
            localStorage.setItem('last_key', document.getElementById('key').value);

            currentChatId = Date.now().toString();
            chatHistory = [];
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('active-bot-name').innerText = document.getElementById('bot-name').value;
            
            saveChatState();
            loadSidebar();
        }

        function formatMessage(text) {
            return text.replace(/\*(.*?)\*/g, '<span class="action-text">*$1*</span>');
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            appendMessage('user', text);
            input.value = '';
            input.style.height = '45px';
            
            const model = document.getElementById('model').value;
            const key = document.getElementById('key').value;

            const systemPrompt = `Você é ${document.getElementById('bot-name').value}. 
            Personalidade: ${document.getElementById('bot-personality').value}. 
            Aparência: ${document.getElementById('bot-appearance').value}.
            Usuário: ${document.getElementById('user-name').value}. 
            Personalidade do Usuário: ${document.getElementById('user-personality').value}. 
            Aparência do Usuário: ${document.getElementById('user-appearance').value}.
            Regra: Use asteriscos para ações. Responda em Português.`;

            const msgs = [
                {role: "system", content: systemPrompt}, 
                ...chatHistory.map(m => ({role: m.role==='user'?'user':'assistant', content: m.content}))
            ];

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin,
                        "X-Title": "Dark Chats v2"
                    },
                    body: JSON.stringify({ "model": model, "messages": msgs })
                });

                const data = await res.json();
                if(data.error) throw new Error(data.error.message);

                const reply = data.choices[0].message.content;
                const thought = `Eu sou ${document.getElementById('bot-name').value}. O usuário é ${document.getElementById('user-name').value}. Estou focando na minha personalidade (${document.getElementById('bot-personality').value}) para manter a imersão.`;
                
                appendMessage('bot', reply, thought);
                saveChatState();
            } catch(e) {
                appendMessage('bot', "Erro: " + e.message);
            }
        }

        function appendMessage(role, text, thought = null) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `bubble ${role === 'user' ? 'user-m' : 'bot-m'}`;
            
            let content = `<div>${formatMessage(text)}</div>`;
            if(role === 'bot' && thought) {
                content += `<span class="thought-trigger" onclick="this.nextElementSibling.classList.toggle('hidden')">🧠 Pensamento</span><div class="thought-area hidden">${thought}</div>`;
            }
            
            msgDiv.innerHTML = content;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            chatHistory.push({role, content: text, thought});
        }

        function saveChatState() {
            const state = {
                id: currentChatId,
                config: {
                    model: document.getElementById('model').value,
                    botName: document.getElementById('bot-name').value,
                    userName: document.getElementById('user-name').value,
                    botPers: document.getElementById('bot-personality').value,
                    botApp: document.getElementById('bot-appearance').value,
                    userPers: document.getElementById('user-personality').value,
                    userApp: document.getElementById('user-appearance').value
                },
                history: chatHistory
            };
            localStorage.setItem(`chat_${currentChatId}`, JSON.stringify(state));
        }

        function loadSidebar() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            Object.keys(localStorage).filter(k => k.startsWith('chat_')).forEach(k => {
                const c = JSON.parse(localStorage.getItem(k));
                const d = document.createElement('div');
                d.className = 'history-item';
                d.innerText = c.config.botName + " (" + new Date(parseInt(c.id)).toLocaleDateString() + ")";
                d.onclick = () => {
                    currentChatId = c.id;
                    document.getElementById('chat-messages').innerHTML = '';
                    chatHistory = [];
                    c.history.forEach(m => appendMessage(m.role, m.content, m.thought));
                    document.getElementById('active-bot-name').innerText = c.config.botName;
                    
                    // Preencher campos de config para permitir continuar o chat
                    document.getElementById('model').value = c.config.model;
                    document.getElementById('bot-name').value = c.config.botName;
                    document.getElementById('user-name').value = c.config.userName;
                    document.getElementById('bot-personality').value = c.config.botPers || "";
                    document.getElementById('bot-appearance').value = c.config.botApp || "";
                    document.getElementById('user-personality').value = c.config.userPers || "";
                    document.getElementById('user-appearance').value = c.config.userApp || "";

                    document.getElementById('setup-screen').classList.add('hidden');
                    document.getElementById('chat-screen').classList.remove('hidden');
                    toggleMenu();
                };
                list.appendChild(d);
            });
        }

        function backToMenu() {
            document.getElementById('chat-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        function openQuickSettings() {
            const m = prompt("Novo Modelo:", document.getElementById('model').value);
            const k = prompt("Nova Key:", document.getElementById('key').value);
            if(m) { document.getElementById('model').value = m; localStorage.setItem('last_model', m); }
            if(k) { document.getElementById('key').value = k; localStorage.setItem('last_key', k); }
        }

        // Auto-ajuste da altura do textarea conforme digita
        document.getElementById('user-input').addEventListener('input', function() {
            this.style.height = '45px';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
